<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CandyCraft Creative Inventory Editor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>&#21019;&#36896;&#27169;&#24335;&#29289;&#21697;&#26639;&#32534;&#36753;&#22120;</h1>
        <p>&#20687; Minecraft &#21019;&#36896;&#29289;&#21697;&#26639;&#19968;&#26679;&#25302;&#21160;&#26684;&#23376;&#12290;&#20445;&#23384;&#21518;&#38656;&#35201;&#37325;&#26032;&#26500;&#24314; jar&#12290;</p>
      </div>
      <div id="connection" class="pill ok">&#24050;&#21152;&#36733;</div>
    </header>

    <section class="controls">
      <button class="tab active" data-tab="blocks">&#26041;&#22359;</button>
      <button class="tab" data-tab="food">&#39135;&#29289;</button>
      <button class="tab" data-tab="tools_armor">&#24037;&#20855;&#19982;&#30420;&#30002;</button>
      <button class="tab" data-tab="misc">&#26434;&#39033;</button>
      <input id="search" placeholder="Search / &#25628;&#32034;&#29289;&#21697;&#21517;&#25110;&#27880;&#20876;&#21517;">
      <button id="save" class="save">&#20445;&#23384;&#39034;&#24207;</button>
    </section>

    <main class="layout">
      <section class="minecraft-panel">
        <div class="panel-title">
          <span id="activeTitle">CandyCraft</span>
          <span id="activeCount">__ACTIVE_COUNT__</span>
        </div>
        <div id="activeGrid" class="mc-grid">__ACTIVE_SLOTS__</div>
        <div class="trash" id="trash">&#25302;&#21040;&#36825;&#37324;&#65306;&#31227;&#20986;&#24403;&#21069;&#29289;&#21697;&#26639;</div>
      </section>

      <aside class="library-panel">
        <div class="panel-title">
          <span>&#20840;&#37096;&#29289;&#21697;&#21644;&#26041;&#22359;</span>
          <span id="libraryCount">__LIBRARY_COUNT__</span>
        </div>
        <div class="hint">&#20174;&#36825;&#37324;&#25302;&#21040;&#24038;&#36793;&#26684;&#23376;&#65307;&#24038;&#36793;&#26684;&#23376;&#20043;&#38388;&#25302;&#21160;&#23601;&#33021;&#25442;&#39034;&#24207;&#12290;</div>
        <div id="libraryGrid" class="mc-grid library">__LIBRARY_SLOTS__</div>
      </aside>
    </main>
  </div>

  <div id="toast"></div>
  <div id="dragGhost" class="drag-ghost"></div>

  <script>
    const initialState = __INITIAL_STATE__;
    const state = {
      items: new Map(initialState.items.map(item => [item.id, item])),
      tabs: {
        blocks: [...(initialState.tabs.blocks || [])],
        food: [...(initialState.tabs.food || [])],
        tools_armor: [...(initialState.tabs.tools_armor || [])],
        misc: [...(initialState.tabs.misc || [])]
      },
      activeTab: "blocks"
    };

    const activeGrid = document.getElementById("activeGrid");
    const libraryGrid = document.getElementById("libraryGrid");
    const activeTitle = document.getElementById("activeTitle");
    const activeCount = document.getElementById("activeCount");
    const libraryCount = document.getElementById("libraryCount");
    const search = document.getElementById("search");
    const toast = document.getElementById("toast");
    const dragGhost = document.getElementById("dragGhost");
    let dragState = null;

    function showToast(text) {
      toast.textContent = text;
      toast.className = "show";
      setTimeout(() => toast.className = "", 1800);
    }

    function itemName(item) {
      return item ? item.name : "";
    }

    function shortId(id) {
      return id.replace("candycraftmod:", "");
    }

    function itemSlot(item, place) {
      const slot = document.createElement("button");
      slot.className = "slot";
      slot.type = "button";
      slot.draggable = false;
      slot.dataset.id = item.id;
      slot.dataset.place = place;
      slot.title = `${item.name}\n${item.id}`;
      slot.innerHTML = `
        <span class="sprite">${item.texture ? `<img src="${item.texture}" alt="">` : ""}</span>
        <span class="tooltip">${escapeHtml(item.name)}<br><small>${shortId(item.id)}</small></span>
      `;
      slot.addEventListener("pointerdown", event => startDrag(event, item.id, slot));
      return slot;
    }

    function emptySlot(index) {
      const slot = document.createElement("div");
      slot.className = "slot empty";
      return slot;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
    }

    function removeEverywhere(id) {
      for (const tab of Object.keys(state.tabs)) {
        state.tabs[tab] = state.tabs[tab].filter(x => x !== id);
      }
    }

    function dropIntoActive(id, targetId, placement = "append") {
      if (!state.items.has(id)) return;
      const oldList = [...state.tabs[state.activeTab]].filter(x => x !== id);
      removeEverywhere(id);
      const list = state.tabs[state.activeTab];
      let index = -1;
      if (targetId) {
        index = oldList.indexOf(targetId);
        if (index >= 0 && placement === "after") {
          index += 1;
        }
      }
      if (index >= 0) list.splice(index, 0, id);
      else list.push(id);
      render();
    }

    function removeFromActive(id) {
      state.tabs[state.activeTab] = state.tabs[state.activeTab].filter(x => x !== id);
      render();
    }

    function matches(item, query) {
      if (!query) return true;
      const q = query.toLowerCase();
      return item.name.toLowerCase().includes(q) || item.id.toLowerCase().includes(q);
    }

    function startDrag(event, id, slot) {
      if (event.button !== 0 || !state.items.has(id)) return;
      event.preventDefault();
      slot.setPointerCapture(event.pointerId);
      const item = state.items.get(id);
      dragState = {
        id,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        moved: false,
        target: null,
        sourceSlot: slot
      };
      dragGhost.innerHTML = `<span class="sprite">${item.texture ? `<img src="${item.texture}" alt="">` : ""}</span>`;
      dragGhost.className = "drag-ghost";
      moveGhost(event.clientX, event.clientY);
      slot.classList.add("drag-source");
      document.body.classList.add("is-dragging");
      slot.addEventListener("pointermove", dragMove);
      slot.addEventListener("pointerup", finishDrag);
      slot.addEventListener("pointercancel", cancelDrag);
    }

    function dragMove(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      const dx = Math.abs(event.clientX - dragState.startX);
      const dy = Math.abs(event.clientY - dragState.startY);
      if (!dragState.moved && dx + dy > 3) {
        dragState.moved = true;
        dragGhost.classList.add("show");
      }
      if (!dragState.moved) return;
      event.preventDefault();
      moveGhost(event.clientX, event.clientY);
      updateDropTarget(event.clientX, event.clientY);
      autoScrollNearEdge(event.clientX, event.clientY);
    }

    function finishDrag(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      const stateToDrop = dragState;
      cleanupDrag();
      if (!stateToDrop.moved || !stateToDrop.target) return;
      if (stateToDrop.target.type === "trash") {
        removeFromActive(stateToDrop.id);
      } else if (stateToDrop.target.type === "active") {
        if (stateToDrop.target.id === stateToDrop.id) {
          return;
        }
        dropIntoActive(stateToDrop.id, stateToDrop.target.id, stateToDrop.target.placement);
      }
    }

    function cancelDrag(event) {
      if (!dragState || event.pointerId !== dragState.pointerId) return;
      cleanupDrag();
    }

    function cleanupDrag() {
      clearDropHints();
      if (dragState && dragState.sourceSlot) {
        dragState.sourceSlot.classList.remove("drag-source");
        dragState.sourceSlot.removeEventListener("pointermove", dragMove);
        dragState.sourceSlot.removeEventListener("pointerup", finishDrag);
        dragState.sourceSlot.removeEventListener("pointercancel", cancelDrag);
      }
      document.body.classList.remove("is-dragging");
      dragGhost.className = "drag-ghost";
      dragGhost.innerHTML = "";
      dragState = null;
    }

    function moveGhost(x, y) {
      dragGhost.style.transform = `translate(${x + 14}px, ${y + 14}px)`;
    }

    function updateDropTarget(x, y) {
      clearDropHints();
      if (!dragState) return;
      const trash = document.getElementById("trash");
      const trashRect = trash.getBoundingClientRect();
      if (pointInRect(x, y, trashRect)) {
        trash.classList.add("drop-trash");
        dragState.target = { type: "trash" };
        return;
      }
      const element = document.elementFromPoint(x, y);
      const grid = element && element.closest && element.closest("#activeGrid");
      if (!grid) {
        dragState.target = null;
        return;
      }
      const slot = element.closest(".slot");
      if (!slot || slot.classList.contains("empty")) {
        grid.classList.add("drop-append");
        dragState.target = { type: "active", id: null, placement: "append" };
        return;
      }
      const rect = slot.getBoundingClientRect();
      const placement = x < rect.left + rect.width / 2 ? "before" : "after";
      slot.classList.add(placement === "before" ? "drop-before" : "drop-after");
      dragState.target = { type: "active", id: slot.dataset.id, placement };
    }

    function clearDropHints() {
      document.querySelectorAll(".drop-before,.drop-after,.drop-append,.drop-trash")
        .forEach(element => element.classList.remove("drop-before", "drop-after", "drop-append", "drop-trash"));
    }

    function pointInRect(x, y, rect) {
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function autoScrollNearEdge(x, y) {
      for (const grid of [activeGrid, libraryGrid]) {
        const rect = grid.getBoundingClientRect();
        if (!pointInRect(x, y, rect)) continue;
        const edge = 42;
        if (y < rect.top + edge) grid.scrollTop -= 16;
        if (y > rect.bottom - edge) grid.scrollTop += 16;
      }
    }

    function render() {
      const query = search.value.trim();
      const active = state.tabs[state.activeTab];
      const used = new Set(Object.values(state.tabs).flat());
      activeTitle.textContent = {
        blocks: "\u65b9\u5757",
        food: "\u98df\u7269",
        tools_armor: "\u5de5\u5177\u4e0e\u76d4\u7532",
        misc: "\u6742\u9879"
      }[state.activeTab] || state.activeTab;
      activeCount.textContent = `${active.length} items`;
      activeGrid.innerHTML = "";

      const visibleActive = active.filter(id => state.items.has(id) && matches(state.items.get(id), query));
      for (const id of visibleActive) activeGrid.appendChild(itemSlot(state.items.get(id), "active"));
      const minSlots = Math.max(54, Math.ceil(visibleActive.length / 9) * 9);
      for (let i = visibleActive.length; i < minSlots; i++) activeGrid.appendChild(emptySlot(i));

      const libraryItems = [...state.items.values()]
        .filter(item => !used.has(item.id))
        .filter(item => matches(item, query))
        .sort((a, b) => itemName(a).localeCompare(itemName(b), "zh-Hans-CN"));
      libraryCount.textContent = `${libraryItems.length} items`;
      libraryGrid.innerHTML = "";
      for (const item of libraryItems) libraryGrid.appendChild(itemSlot(item, "library"));
    }

    function setActiveTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll(".tab").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === tab);
      });
      render();
    }

    async function save() {
      const res = await fetch("/api/save", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(state.tabs)
      });
      const data = await res.json();
      if (!data.ok) {
        showToast("Save failed");
        alert(data.error || "Save failed");
        return;
      }
      showToast("\u5df2\u4fdd\u5b58 order.json");
    }

    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => setActiveTab(button.dataset.tab));
    });
    document.getElementById("save").addEventListener("click", save);
    search.addEventListener("input", render);
    render();
  </script>
</body>
</html>
